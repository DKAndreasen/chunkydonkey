services:

  # --- PostgreSQL ---
  postgres:
    image: timescale/timescaledb-ha:pg17
    container_name: chunkydonkey-postgres
    networks:
      - internal
    environment:
      POSTGRES_USER: chunkydonkey
      POSTGRES_PASSWORD: chunkydonkey
      POSTGRES_DB: chunkydonkey
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chunkydonkey"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # --- Gotenberg ---
  gotenberg:
    build:
      context: .
      dockerfile: gotenberg/Dockerfile
    image: gotenberg-custom:8
    container_name: chunkydonkey-gotenberg
    networks:
      - internal
    environment:
      - GOTENBERG_API_TIMEOUT=120s
      - GOTENBERG_LIBREOFFICE_RESTART_AFTER=100
      - GOTENBERG_LIBREOFFICE_AUTO_START=true
      - GOTENBERG_CHROMIUM_RESTART_AFTER=100
      - GOTENBERG_CHROMIUM_AUTO_START=true
    deploy:
      resources:
        limits:
          memory: 2G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # --- Browserless (headless Chrome for Playwright) ---
  browserless:
    image: ghcr.io/browserless/chromium
    container_name: chunkydonkey-browserless
    networks:
      - internal
    environment:
      - TIMEOUT=60000
      - CONCURRENT=5
    deploy:
      resources:
        limits:
          memory: 2G
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/json/version || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # --- SeaweedFS (S3-compatible blob storage) ---
  seaweedfs:
    image: chrislusf/seaweedfs
    container_name: chunkydonkey-seaweedfs
    networks:
      - internal
    command: "server -master.port=9333 -volume.port=8080 -filer -s3"
    volumes:
      - seaweeddata:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8333/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # --- chunkydonkey API ---
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chunkydonkey-api
    networks:
      - proxy
      - internal
    environment:
      - DATABASE_URL=postgresql://chunkydonkey:chunkydonkey@postgres:5432/chunkydonkey
      - GOTENBERG_URL=http://gotenberg:3000
      - BROWSERLESS_URL=ws://browserless:3000
      - S3_ENDPOINT_URL=http://seaweedfs:8333
      - MAX_FILE_SIZE=104857600
      - API_KEY=${CHUNKYDONKEY_API_KEY:-}
    volumes:
      - ./src:/app/src
      - ./schema.sql:/app/schema.sql
    ports:
      - "${API_PORT:-5000}:5000"
    depends_on:
      postgres:
        condition: service_healthy
      gotenberg:
        condition: service_healthy
      browserless:
        condition: service_healthy
      seaweedfs:
        condition: service_healthy
    command: ["uvicorn", "src.chunkydonkey.main:app", "--host", "0.0.0.0", "--port", "5000", "--reload"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
  seaweeddata:

networks:
  proxy:
    external: true
    name: caddy_proxy
  internal:
    driver: bridge
